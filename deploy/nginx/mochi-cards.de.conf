# Production — mochi-cards.de
# Pfad auf VM: /etc/nginx/sites-available/mochi-cards.de
#
# Nach dem ersten HTTP-Test:
#   certbot --nginx -d mochi-cards.de -d www.mochi-cards.de
#
# PHP-Socket prüfen: ls /run/php/php*-fpm.sock

server {
    listen 80;
    listen [::]:80;
    server_name mochi-cards.de www.mochi-cards.de;

    root /var/www/mochi-cards/public;
    index index.php;

    location /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        return 301 https://mochi-cards.de$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mochi-cards.de www.mochi-cards.de;

    root /var/www/mochi-cards/public;
    index index.php;

    # Certbot setzt diese Pfade automatisch:
    # ssl_certificate     /etc/letsencrypt/live/mochi-cards.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mochi-cards.de/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($host = www.mochi-cards.de) {
        return 301 https://mochi-cards.de$request_uri;
    }

    charset utf-8;
    client_max_body_size 32M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ^~ /build/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
